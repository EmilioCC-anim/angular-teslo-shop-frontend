<div class="card bg-base-100 shadow-sm animate-fadeIn">
  <figure>
    <img [src]="product().images | productImagePipe" [alt]="product().title" />
  </figure>
  <div class="card-body bg-gray-800 rounded-b-2xl">
    <h2 class="card-title font-montserrat text-accent text-xl hover:underline cursor-pointer"
      [routerLink]="['/product',product().slug]">{{product().title}}</h2>
    <p>{{product().description | slice: 0:70}}...</p>
    <div class="card-actions justify-end">
      <a [routerLink]="['/product',product().slug]" class="link link-primary">More about...</a>
    </div>
  </div>
</div>
