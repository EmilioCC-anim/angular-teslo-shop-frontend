<div class=" flex items-center justify-center">
  <div class="join">
    @for (page of getPagesList(); track page; let i=$index)
    {
    <button class="join-item btn" [class.btn-primary]="page===activePage()" [routerLink]="[]"
      [queryParams]="{page:page}" (click)="activePage.set(page)">{{page}}</button>
    }
    @empty
    {
    <p>No more pages</p>
    }
  </div>
</div>
